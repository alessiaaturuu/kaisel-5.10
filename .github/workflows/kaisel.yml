name: Build & Repack Kernel Tanzanite (5.10.888-kaisel-kernel)

on:
  workflow_dispatch:
    inputs:
      governor:
        description: 'CPU governor (default: schedutil)'
        required: true
        default: 'schedutil'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
      KERNEL_OUT: out

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git gcc g++ bc bison flex libncurses5-dev libssl-dev make wget unzip python3

      - name: Clone official GKI kernel
        run: |
          git clone https://android.googlesource.com/kernel/common.git kernel
          cd kernel
          git checkout android-16-12-5.10

      - name: Clone device tree & vendor
        run: |
          git clone https://github.com/nathanzerogarage/android_device_xiaomi_tanzanite.git device/tanzanite
          git clone https://github.com/nathanzerogarage/proprietary_vendor_xiaomi_tanzanite.git vendor/tanzanite

      - name: Set defconfig & tweak kernel
        run: |
          cd kernel
          make O=$KERNEL_OUT ARCH=$ARCH tanzanite_defconfig
          # Set CPU governor
          sed -i 's/CONFIG_CPU_FREQ_DEFAULT_GOV=.*/CONFIG_CPU_FREQ_DEFAULT_GOV_'${{ github.event.inputs.governor^^ }}'=y/' $KERNEL_OUT/.config
          echo 'CONFIG_LOCALVERSION="-5.10.888-kaisel-kernel"' >> $KERNEL_OUT/.config
          make O=$KERNEL_OUT ARCH=$ARCH olddefconfig

      - name: Build kernel
        run: |
          cd kernel
          make -j$(nproc) O=$KERNEL_OUT ARCH=$ARCH

      - name: Download ramdisk & vendor_boot.img
        run: |
          mkdir -p images
          wget -O images/ramdisk.img https://raw.githubusercontent.com/nathanzerogarage/proprietary_vendor_xiaomi_tanzanite/main/ramdisk.img
          wget -O images/vendor_boot.img https://raw.githubusercontent.com/nathanzerogarage/proprietary_vendor_xiaomi_tanzanite/main/vendor_boot.img

      - name: Repack boot.img
        run: |
          cd kernel
          wget -O mkbootimg https://github.com/LineageOS/android_bootable_recovery/raw/lineage-23/mkbootimg
          chmod +x mkbootimg
          ./mkbootimg --kernel $KERNEL_OUT/Image.gz-dtb \
                      --ramdisk ../images/ramdisk.img \
                      --vendor_ramdisk ../images/vendor_boot.img \
                      --cmdline "androidboot.hardware=tanzanite" \
                      --output ../images/boot-5.10.888-kaisel-kernel.img

      - name: Upload boot.img artifact
        uses: actions/upload-artifact@v3
        with:
          name: tanzanite-boot-5.10.888-kaisel-kernel
          path: images/boot-5.10.888-kaisel-kernel.img
